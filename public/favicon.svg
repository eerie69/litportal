<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Внешний круг (корпус пластинки) -->
  <circle cx="50" cy="50" r="45" fill="#1a1a1a" stroke="#c9a961" stroke-width="2"/>
  
  <!-- Внутренний круг (лейбл пластинки) -->
  <circle cx="50" cy="50" r="30" fill="#2d2420" stroke="#c9a961" stroke-width="1.5"/>
  
  <!-- Центральное отверстие - просто круглая точка -->
  <circle cx="50" cy="50" r="5" fill="#c9a961"/>
  
  <!-- Бороздки пластинки (концентрические круги) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#c9a961" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c9a961" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.3"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#c9a961" stroke-width="0.5" stroke-dasharray="2 6" opacity="0.4"/>
  
  <!-- Блик для объема -->
  <ellipse cx="35" cy="35" rx="8" ry="6" fill="white" opacity="0.08" transform="rotate(-45 35 35)"/>
  
  <!-- Меньший блик -->
  <ellipse cx="65" cy="65" rx="4" ry="3" fill="white" opacity="0.05" transform="rotate(-45 65 65)"/>
</svg>